name: Refresh World Cup data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh data during match windows
        run: python3 scripts/update_world_cup_tracker.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- world-cup-data.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "world-cup-group-signal-bot"
          git config user.email "actions@github.com"
          git add world-cup-data.json
          git commit -m "data: refresh World Cup tracker"
          git push
